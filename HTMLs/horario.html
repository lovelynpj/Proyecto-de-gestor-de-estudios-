<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Horario</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../CSSs/inicio.css">
    <link rel="stylesheet" href="../CSSs/horario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../Imgs/Logo_Texto.png" type="image/x-icon">

</head>

<body>
    <!-- <h1 class="titulo">Bienvenido a Booking</h1>
    <h3 class="subtitulo">inicio</h3> -->
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <img src="../Imgs/logo.png" alt="Logo de Booking">
                <span class="nombre">Booking</span>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="inicio.html">Inicio</a></li>
                    <li><a href="materias.html">Materias</a></li>
                    <li><a href="tareas.html">Tareas</a></li>
                    <li><a href="horario.html" class="active">Horarios</a></li>
                    <li><a href="resumenes.html">Resúmenes</a></li>
                    <li><a href="https://xbrucapoo.github.io/CuantoFalta--Booking/">CuantoFalta?</a></li>
                </ul>
            </nav>
        </aside>
        

        <main class="contenido">  
            
            <h2 class="titulo">Horarios </h2>

            <section class="card-superior">

                <section class="tarjeta">
                    <div class="titulo-section">
                        <div class="icono-horario-semanal">
                            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg> 
                        </div>
                        <div class="texto">
                            <p class="titulo-tarjeta">Horas semanales</p>
                            <h2>3hs</h2>
                            <p>de estudio</p>
                        </div>
                        </div>
                </section>

                <section class="tarjeta">
                    <div class="titulo-section">

                        <div class="icono-clases-semanales">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open-check-icon lucide-book-open-check">
                                <path d="M12 21V7"/><path d="m16 12 2 2 4-4"
                                /><path d="M22 6V4a1 1 0 0 0-1-1h-5a4 4 0 0 0-4 4 4 4 0 0 0-4-4H3a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h6a3 3 0 0 1 3 3 3 3 0 0 1 3-3h6a1 1 0 0 0 1-1v-1.3"/>
                            </svg>
                        </div>
                        <div class="texto">
                            <p class="titulo-tarjeta">Clases de esta semana</p>
                            <h2>23</h2>
                            <p>sesiones</p>
                        </div>
                        </div>
                </section>

                <section class="tarjeta">
                    <div class="titulo-section">

                        <div class="icono-clases-proximas">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-calendar-days-icon lucide-calendar-days">
                                <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"
                                /><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>
                            </svg>
                        </div>
                        <div class="texto">
                            <p class="titulo-tarjeta">Proximas clases</p>
                            <h2>En 1hs 20m</h2>
                            <p>sesiones</p>
                        </div>
                        </div>
                </section>

                <section class="tarjeta">
                    <div class="titulo-section">

                        <div class="icono-clases-completadas">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" 
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" 
                            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-check-icon lucide-circle-check">
                            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
                        </svg>
                        </div>
                        <div class="texto">
                            <p class="titulo-tarjeta">Clases completadas</p>
                            <h2>12</h2>
                            <p>esta semana</p>
                        </div>
                        </div>
                </section>

            </section>
            
            <section class="horario-semanal">
                    <div class="encabezado">
                        <h3 class="mi-horario">Mi horario semanal</h3>

                        <div class="controles">

                            <div class="vista-horario">

                                <span class="texto-ver">Ver por:</span>

                                <button class="btn-vista activo" data-vista="semana">Semana</button>
                                <button class="btn-vista" data-vista="dia">Día</button>
                            </div>

                            <div class="dias">
                                <button class="btn-flecha"> < </button>

                                <span id="fecha-actual">
                                    6-10 de Julio
                                </span>

                                <button class="btn-flecha"> > </button>
                            </div>

                            <div>
                                <button class="btn-agregar-bloque">
                                        + Agregar bloque
                                </button>
                            </div>
                        </div>
                    </div>
            </section>

        </main>
    </div>



</body>
</html>

</html>
